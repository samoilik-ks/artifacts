<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artifacts</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fafaf9;
      color: #1c1c1a;
      min-height: 100vh;
      padding: 64px 24px;
    }
    .container { max-width: 640px; margin: 0 auto; }
    h1 {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 32px;
    }
    ul { list-style: none; }
    li { border-top: 1px solid #e8e8e6; }
    li:last-child { border-bottom: 1px solid #e8e8e6; }
    a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0;
      text-decoration: none;
      color: #1c1c1a;
      font-size: 15px;
      transition: color 0.15s;
    }
    a:hover { color: #4a7c59; }
    a::after { content: "→"; color: #ccc; font-size: 14px; }
    a:hover::after { color: #4a7c59; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Artifacts</h1>
    <ul>
      <li><a href="skyro-tov-landing/">Skyro — Global Tone of Voice Guide</a></li>
    </ul>
  </div>
</body>
</html>
